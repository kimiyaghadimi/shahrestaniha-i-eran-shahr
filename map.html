    <body>
        <nav class="navbar">
            <ul class="nav-links-left">
                <li><a href="texts-static.html">Text</a></li>
                <li><a href="analysis.html">Analysis</a></li>
                <li><a href="glossary.html">Glossary</a></li>

        <main class="content">
            <h1>Cities of the Empire</h1>
            <p class="map-subtitle"></p>

            <div class="map-legend">
                <div class="legend-item">
                    <div class="legend-dot" style="background:#b8922a"></div>
                    <span>Quarter of the Northeast</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#c02641"></div>
                    <span>Quarter of the Southwest</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#4a8a4a"></div>
                    <span>Quarter of the Southeast</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#7a4a9a"></div>
                    <span>Quarter of the Northwest</span>
                </div>
            </div>
        </main>

        <section class="map-section">
            <div class="map-wrap">
                <img src="city_map.png" alt="Map of cities in Šahrestānīhā ī Ērānšahr" class="map-image"/>
            </div>
            <p class="map-caption">Cities without confirmed locations are not shown.</p>
        </section>
